description: 'FOCUS-aligned FinOps for Microsoft Power Apps: per-user subscriptions plus Dataverse capacity
  add-ons and optional Azure-billed pay-as-you-go meter, governed by 24-hour Power Platform request entitlements.'
sources:
  - https://www.microsoft.com/en-us/power-platform/products/power-apps/pricing
  - https://learn.microsoft.com/en-us/power-platform/admin/api-request-limits-allocations
  - https://learn.microsoft.com/en-us/power-apps/developer/data-platform/api-limits
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Microsoft Corporation
serviceCategory: Business Applications / Low-Code
billingModel:
  pricingCategory: Tiered Subscription + Pay-As-You-Go
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Microsoft Power Apps
  ServiceCategory: Business Applications
  ProviderName: Microsoft
  PublisherName: Microsoft Corporation
  InvoiceIssuerName: Microsoft Corporation
  BillingCurrency: USD
  PricingUnit: seat-month
  ChargeCategory: Usage
meters:
  - name: premium_seats
    unit: seat
    aggregation: sum
    dimensions:
      - tenant
      - environment
      - assigned_user
  - name: developer_seats
    unit: seat
    aggregation: count
    dimensions:
      - tenant
  - name: power_platform_requests
    unit: request
    aggregation: sum
    dimensions:
      - user
      - environment
      - product
      - tenant
  - name: dataverse_database_capacity
    unit: GB-month
    aggregation: max
    dimensions:
      - environment
      - tenant
  - name: dataverse_file_capacity
    unit: GB-month
    aggregation: max
    dimensions:
      - environment
      - tenant
  - name: ppr_capacity_addon_packs
    unit: pack-month
    aggregation: sum
    dimensions:
      - tenant
  - name: payg_active_users
    unit: user
    aggregation: count
    dimensions:
      - app
      - environment
principles:
  - name: Visibility
    description: Use the Power Platform admin center capacity reports (Licensed user, Non-licensed
      user, Per-flow) to download CSV usage of Power Platform requests; surface seat licensing through
      the Microsoft 365 admin center.
  - name: Allocation
    description: Tag environments with consuming team / cost center; attribute seat licenses to assigned
      users via Microsoft 365 license groups; allocate Dataverse capacity by environment to map back
      to product owners.
  - name: Optimization
    description: Right-size between Premium ($20) and per-app / pay-as-you-go for low-frequency users;
      consolidate apps to fewer environments to reduce Dataverse capacity floor; cache Dataverse reads
      to stay under the 6,000-requests / 5-minute service-protection ceiling rather than buying PPR
      add-ons.
  - name: Accountability
    description: Assign each environment to a budget owner; review the Capacity page monthly; investigate
      users who breach 75% of their PPR daily entitlement two days in a row to determine whether they
      need an add-on, a license upgrade, or a code fix.
maintainers:
