  responses:
    BadRequest:
      description: >-
        The request was malformed or contained invalid data. Check the request
        body and query parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'

    Unauthorized:
      description: >-
        Authentication failed. Ensure a valid OAuth 2.0 bearer token is
        included in the Authorization header.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'

    Forbidden:
      description: >-
        The authenticated user does not have sufficient permissions to perform
        this operation. Check Dataverse security roles and privileges.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'

    NotFound:
      description: >-
        The requested record was not found. Verify the record identifier
        is correct and the record exists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'

    PreconditionFailed:
      description: >-
        The If-Match header value does not match the current ETag of the
        record, indicating the record has been modified since it was last
        retrieved. Retrieve the latest version and retry.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ODataError'

