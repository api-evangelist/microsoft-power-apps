openapi: 3.1.0
info:
  title: Microsoft Power Apps Microsoft Dataverse Web API
  description: >-
    RESTful API for interacting with Microsoft Dataverse (formerly Common Data
    Service), the underlying data platform for Microsoft Power Apps. This API
    follows OData v4.0 conventions and provides CRUD operations on Dataverse
    tables including accounts, contacts, and entity definitions. Each Dataverse
    environment has a unique organization URL and may include custom tables and
    operations specific to that environment.
  version: '9.2'
  termsOfService: https://www.microsoft.com/licensing/terms/productoffering/MicrosoftPowerApps
  contact:
    name: Microsoft Power Apps Developer Support
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/webapi/overview
  license:
    name: Microsoft Software License
    url: https://www.microsoft.com/licensing/terms/productoffering/MicrosoftPowerApps
  x-namespace: Microsoft.Dynamics.CRM

servers:
- url: https://{organization}.api.crm.dynamics.com/api/data/v9.2
  description: Dataverse Web API v9.2 endpoint (North America)
  variables:
    organization:
      default: yourorg
      description: >-
        The unique organization name for your Dataverse environment. Find this
        in the Power Platform admin center under environment details.
- url: https://{organization}.api.crm2.dynamics.com/api/data/v9.2
  description: Dataverse Web API v9.2 endpoint (South America)
  variables:
    organization:
      default: yourorg
      description: The unique organization name for your Dataverse environment.
- url: https://{organization}.api.crm4.dynamics.com/api/data/v9.2
  description: Dataverse Web API v9.2 endpoint (Europe)
  variables:
    organization:
      default: yourorg
      description: The unique organization name for your Dataverse environment.
- url: https://{organization}.api.crm5.dynamics.com/api/data/v9.2
  description: Dataverse Web API v9.2 endpoint (Asia Pacific)
  variables:
    organization:
      default: yourorg
      description: The unique organization name for your Dataverse environment.

security:
- oauth2: []

tags:
- name: Accounts
  description: >-
    Operations on the account entity set. An account represents a business
    that is a customer or potential customer, typically the company billed in
    business transactions.
  externalDocs:
    description: Account EntityType Reference
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/webapi/reference/account
- name: Contacts
  description: >-
    Operations on the contact entity set. A contact represents a person with
    whom a business unit has a relationship, such as a customer, supplier, or
    colleague.
  externalDocs:
    description: Contact EntityType Reference
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/webapi/reference/contact
- name: Entities
  description: >-
    Operations on the entity definition entity set. Provides metadata about
    Dataverse tables (entities) including their logical names, collection
    names, and structural information. Read-only access via RetrieveMultiple.
  externalDocs:
    description: Entity EntityType Reference
    url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/webapi/reference/entity

paths:
  /accounts:
    get:
      operationId: getAccounts
      summary: Microsoft Power Apps Retrieve Multiple Accounts
      description: >-
        Retrieves a collection of account records from Dataverse. Supports OData
        query options for filtering, sorting, selecting fields, expanding
        navigation properties, and pagination.
      tags:
      - Accounts
      parameters:
      - $ref: '#/components/parameters/ODataSelect'
      - $ref: '#/components/parameters/ODataFilter'
      - $ref: '#/components/parameters/ODataOrderBy'
      - $ref: '#/components/parameters/ODataTop'
      - $ref: '#/components/parameters/ODataSkip'
      - $ref: '#/components/parameters/ODataExpand'
      - $ref: '#/components/parameters/ODataCount'
      - $ref: '#/components/parameters/Prefer'
      - $ref: '#/components/parameters/ODataMaxPageSize'
      responses:
        '200':
          description: Successfully retrieved account collection.
          headers:
            OData-Version:
              description: OData protocol version.
              schema:
                type: string
                example: '4.0'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createAccount
      summary: Microsoft Power Apps Create a New Account
      description: >-
        Creates a new account record in Dataverse. Returns the created record
        when the Prefer header is set to return=representation.
      tags:
      - Accounts
      parameters:
      - $ref: '#/components/parameters/Prefer'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Account'
      responses:
        '204':
          description: Account created successfully.
          headers:
            OData-EntityId:
              description: URI of the newly created account record.
              schema:
                type: string
                format: uri
        '201':
          description: >-
            Account created successfully with representation returned (when
            Prefer: return=representation is specified).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /accounts({accountid}):
    get:
      operationId: getAccount
      summary: Microsoft Power Apps Retrieve a Single Account
      description: Retrieves a single account record by its unique identifier.
      tags:
      - Accounts
      parameters:
      - name: accountid
        in: path
        required: true
        description: Unique identifier (GUID) of the account record.
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/ODataSelect'
      - $ref: '#/components/parameters/ODataExpand'
      - $ref: '#/components/parameters/Prefer'
      responses:
        '200':
          description: Successfully retrieved account record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    patch:
      operationId: updateAccount
      summary: Microsoft Power Apps Update an Existing Account
      description: >-
        Updates an existing account record using PATCH (merge update). Only the
        properties included in the request body are updated. This follows the
        OData v4.0 convention for updates.
      tags:
      - Accounts
      parameters:
      - name: accountid
        in: path
        required: true
        description: Unique identifier (GUID) of the account record.
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        description: >-
          Used for optimistic concurrency control. Set to the ETag value of
          the record to ensure you are updating the latest version.
        schema:
          type: string
      - $ref: '#/components/parameters/Prefer'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Account'
      responses:
        '204':
          description: Account updated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deleteAccount
      summary: Microsoft Power Apps Delete an Account
      description: Deletes an existing account record from Dataverse.
      tags:
      - Accounts
      parameters:
      - name: accountid
        in: path
        required: true
        description: Unique identifier (GUID) of the account record.
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Account deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /contacts:
    get:
      operationId: getContacts
      summary: Microsoft Power Apps Retrieve Multiple Contacts
      description: >-
        Retrieves a collection of contact records from Dataverse. Supports OData
        query options for filtering, sorting, selecting fields, expanding
        navigation properties, and pagination.
      tags:
      - Contacts
      parameters:
      - $ref: '#/components/parameters/ODataSelect'
      - $ref: '#/components/parameters/ODataFilter'
      - $ref: '#/components/parameters/ODataOrderBy'
      - $ref: '#/components/parameters/ODataTop'
      - $ref: '#/components/parameters/ODataSkip'
      - $ref: '#/components/parameters/ODataExpand'
      - $ref: '#/components/parameters/ODataCount'
      - $ref: '#/components/parameters/Prefer'
      - $ref: '#/components/parameters/ODataMaxPageSize'
      responses:
        '200':
          description: Successfully retrieved contact collection.
          headers:
            OData-Version:
              description: OData protocol version.
              schema:
                type: string
                example: '4.0'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    post:
      operationId: createContact
      summary: Microsoft Power Apps Create a New Contact
      description: >-
        Creates a new contact record in Dataverse. Returns the created record
        when the Prefer header is set to return=representation.
      tags:
      - Contacts
      parameters:
      - $ref: '#/components/parameters/Prefer'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Contact'
      responses:
        '204':
          description: Contact created successfully.
          headers:
            OData-EntityId:
              description: URI of the newly created contact record.
              schema:
                type: string
                format: uri
        '201':
          description: >-
            Contact created successfully with representation returned (when
            Prefer: return=representation is specified).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /contacts({contactid}):
    get:
      operationId: getContact
      summary: Microsoft Power Apps Retrieve a Single Contact
      description: Retrieves a single contact record by its unique identifier.
      tags:
      - Contacts
      parameters:
      - name: contactid
        in: path
        required: true
        description: Unique identifier (GUID) of the contact record.
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/ODataSelect'
      - $ref: '#/components/parameters/ODataExpand'
      - $ref: '#/components/parameters/Prefer'
      responses:
        '200':
          description: Successfully retrieved contact record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    patch:
      operationId: updateContact
      summary: Microsoft Power Apps Update an Existing Contact
      description: >-
        Updates an existing contact record using PATCH (merge update). Only the
        properties included in the request body are updated.
      tags:
      - Contacts
      parameters:
      - name: contactid
        in: path
        required: true
        description: Unique identifier (GUID) of the contact record.
        schema:
          type: string
          format: uuid
      - name: If-Match
        in: header
        description: >-
          Used for optimistic concurrency control. Set to the ETag value of
          the record to ensure you are updating the latest version.
        schema:
          type: string
      - $ref: '#/components/parameters/Prefer'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Contact'
      responses:
        '204':
          description: Contact updated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deleteContact
      summary: Microsoft Power Apps Delete a Contact
      description: Deletes an existing contact record from Dataverse.
      tags:
      - Contacts
      parameters:
      - name: contactid
        in: path
        required: true
        description: Unique identifier (GUID) of the contact record.
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Contact deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /entities:
    get:
      operationId: getEntities
      summary: Microsoft Power Apps Retrieve Entity Definitions
      description: >-
        Retrieves a collection of entity (table) definitions from Dataverse.
        This endpoint provides metadata about the tables available in the
        environment, including their logical names, collection names, and
        structural information. This is a read-only endpoint supporting only
        RetrieveMultiple operations.
      tags:
      - Entities
      parameters:
      - $ref: '#/components/parameters/ODataSelect'
      - $ref: '#/components/parameters/ODataFilter'
      - $ref: '#/components/parameters/ODataOrderBy'
      - $ref: '#/components/parameters/ODataTop'
      - $ref: '#/components/parameters/ODataSkip'
      - $ref: '#/components/parameters/ODataCount'
      - $ref: '#/components/parameters/Prefer'
      - $ref: '#/components/parameters/ODataMaxPageSize'
      responses:
        '200':
          description: Successfully retrieved entity definition collection.
          headers:
            OData-Version:
              description: OData protocol version.
              schema:
                type: string
                example: '4.0'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /entities({entityid}):
    get:
      operationId: getEntity
      summary: Microsoft Power Apps Retrieve a Single Entity Definition
      description: >-
        Retrieves a single entity (table) definition by its unique identifier.
        Provides metadata about the table including its logical name, collection
        name, and structural information.
      tags:
      - Entities
      parameters:
      - name: entityid
        in: path
        required: true
        description: Unique identifier (GUID) of the entity definition.
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/ODataSelect'
      - $ref: '#/components/parameters/Prefer'
      responses:
        '200':
          description: Successfully retrieved entity definition.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: >-
        OAuth 2.0 authentication using Microsoft Entra ID (formerly Azure Active
        Directory). Applications must be registered in Microsoft Entra ID and
        granted appropriate Dataverse permissions.
      flows:
        authorizationCode:
          authorizationUrl: https://login.microsoftonline.com/{tenantId}/oauth2/v2.0/authorize
          tokenUrl: https://login.microsoftonline.com/{tenantId}/oauth2/v2.0/token
          scopes:
            https://{organization}.crm.dynamics.com/.default: Full access to Dataverse environment
            https://{organization}.crm.dynamics.com/user_impersonation: Access Dataverse as the signed-in user

  parameters:
    ODataSelect:
      name: $select
      in: query
      description: >-
        Comma-separated list of property names to include in the response. Use
        to limit the properties returned and improve performance.
      schema:
        type: string
      example: name,accountnumber,emailaddress1

    ODataFilter:
      name: $filter
      in: query
      description: >-
        OData filter expression to restrict the set of records returned. Supports
        standard OData comparison, logical, and function operators.
      schema:
        type: string
      example: statecode eq 0

    ODataOrderBy:
      name: $orderby
      in: query
      description: >-
        Comma-separated list of properties to sort results by, each optionally
        followed by asc or desc.
      schema:
        type: string
      example: name asc

    ODataTop:
      name: $top
      in: query
      description: Maximum number of records to return.
      schema:
        type: integer
        minimum: 1
      example: 50

    ODataSkip:
      name: $skip
      in: query
      description: Number of records to skip before returning results.
      schema:
        type: integer
        minimum: 0

    ODataExpand:
      name: $expand
      in: query
      description: >-
        Comma-separated list of navigation properties to expand inline in the
        response. Supports nested $select and $filter on expanded entities.
      schema:
        type: string
      example: primarycontactid($select=fullname,emailaddress1)

    ODataCount:
      name: $count
      in: query
      description: >-
        Set to true to include a count of matching records in the response.
      schema:
        type: boolean
      example: true

    Prefer:
      name: Prefer
      in: header
      description: >-
        OData preference header. Common values include
        return=representation (return created/updated record),
        odata.include-annotations="*" (include formatted values),
        and odata.maxpagesize=N (set page size).
      schema:
        type: string
      example: return=representation,odata.include-annotations="*"

    ODataMaxPageSize:
      name: Prefer
      in: header
      description: >-
        Set the maximum page size for paginated results using
        odata.maxpagesize preference. Default is 5000 records.
      schema:
        type: string
      example: odata.maxpagesize=100

  schemas:
    Account:
      type: object
      description: >-
        Business that represents a customer or potential customer. The company
        that is billed in business transactions. Corresponds to the account
        entity type in the Microsoft.Dynamics.CRM namespace.
      properties:
        accountid:
          type: string
          format: uuid
          readOnly: true
          description: Unique identifier of the account.
          example: '500123'
        name:
          type: string
          maxLength: 160
          description: Company or business name of the account.
          example: Example Title
        accountnumber:
          type: string
          maxLength: 20
          description: >-
            ID number or code for the account to quickly search and identify
            the account in system views.
          example: example_value
        accountcategorycode:
          type: integer
          description: >-
            Category indicating whether the customer account is standard or
            preferred. 1 = Preferred Customer, 2 = Standard.
          enum: [1, 2]
          example: 1
        accountclassificationcode:
          type: integer
          description: >-
            Classification code indicating the potential value of the customer
            account. 1 = Default Value.
          example: 10
        accountratingcode:
          type: integer
          description: Rating indicating the value of the customer account.
          example: 10
        description:
          type: string
          maxLength: 2000
          description: Additional information describing the account.
          example: A sample description.
        emailaddress1:
          type: string
          format: email
          maxLength: 100
          description: Primary email address for the account.
          example: user@example.com
        emailaddress2:
          type: string
          format: email
          maxLength: 100
          description: Secondary email address for the account.
          example: user@example.com
        emailaddress3:
          type: string
          format: email
          maxLength: 100
          description: Alternate email address for the account.
          example: user@example.com
        telephone1:
          type: string
          maxLength: 50
          description: Main phone number for the account.
          example: example_value
        telephone2:
          type: string
          maxLength: 50
          description: Second phone number for the account.
          example: example_value
        telephone3:
          type: string
          maxLength: 50
          description: Third phone number for the account.
          example: example_value
        fax:
          type: string
          maxLength: 50
          description: Fax number for the account.
          example: example_value
        websiteurl:
          type: string
          format: uri
          maxLength: 200
          description: Website URL for the account.
          example: https://www.example.com
        industrycode:
          type: integer
          description: >-
            Primary industry of the account for marketing segmentation. Values
            include 1=Accounting, 2=Agriculture, 3=Broadcasting, 4=Brokers,
            5=Building Supply, 6=Business Services, 7=Consulting,
            8=Consumer Services, and others up to 33=Wholesale.
          example: 10
        numberofemployees:
          type: integer
          description: Number of employees at the account.
          example: 10
        revenue:
          type: number
          format: decimal
          description: Annual revenue for the account.
          example: 42.5
        revenue_base:
          type: number
          format: decimal
          readOnly: true
          description: Annual revenue converted to the system default base currency.
          example: 42.5
        ownershipcode:
          type: integer
          description: >-
            Ownership structure of the account. 1 = Public, 2 = Private,
            3 = Subsidiary, 4 = Other.
          enum: [1, 2, 3, 4]
          example: 1
        customertypecode:
          type: integer
          description: >-
            Category describing the relationship between the account and the
            organization. 1=Competitor, 2=Consultant, 3=Customer, 4=Investor,
            5=Partner, 6=Influencer, 7=Press, 8=Prospect, 9=Reseller,
            10=Supplier, 11=Vendor, 12=Other.
          example: 10
        businesstypecode:
          type: integer
          description: Legal designation or other business type of the account.
          example: 10
        sic:
          type: string
          maxLength: 20
          description: Standard Industrial Classification (SIC) code.
          example: example_value
        tickersymbol:
          type: string
          maxLength: 10
          description: Stock exchange symbol for the account.
          example: example_value
        stockexchange:
          type: string
          maxLength: 20
          description: Stock exchange at which the account is listed.
          example: example_value
        sharesoutstanding:
          type: integer
          description: Number of shares available to the public.
          example: 10
        marketcap:
          type: number
          format: decimal
          description: Market capitalization of the account.
          example: 42.5
        creditlimit:
          type: number
          format: decimal
          description: Credit limit of the account.
          example: 42.5
        creditonhold:
          type: boolean
          description: Whether the credit for the account is on hold.
          example: true
        paymenttermscode:
          type: integer
          description: >-
            Payment terms for the account. 1 = Net 30, 2 = 2% 10 Net 30,
            3 = Net 45, 4 = Net 60.
          enum: [1, 2, 3, 4]
          example: 1
        preferredcontactmethodcode:
          type: integer
          description: >-
            Preferred method of contact. 1 = Any, 2 = Email, 3 = Phone,
            4 = Fax, 5 = Mail.
          enum: [1, 2, 3, 4, 5]
          example: 1
        donotemail:
          type: boolean
          description: Whether the account allows direct email.
          example: user@example.com
        donotphone:
          type: boolean
          description: Whether the account allows phone calls.
          example: true
        donotfax:
          type: boolean
          description: Whether the account allows faxes.
          example: true
        donotpostalmail:
          type: boolean
          description: Whether the account allows direct mail.
          example: true
        donotbulkemail:
          type: boolean
          description: Whether the account allows bulk email through campaigns.
          example: user@example.com
        donotsendmm:
          type: boolean
          description: Whether the account accepts marketing materials.
          example: true
        address1_name:
          type: string
          maxLength: 200
          description: Descriptive name for the primary address.
          example: example_value
        address1_line1:
          type: string
          maxLength: 250
          description: First line of the primary address.
          example: example_value
        address1_line2:
          type: string
          maxLength: 250
          description: Second line of the primary address.
          example: example_value
        address1_line3:
          type: string
          maxLength: 250
          description: Third line of the primary address.
          example: example_value
        address1_city:
          type: string
          maxLength: 80
          description: City for the primary address.
          example: example_value
        address1_stateorprovince:
          type: string
          maxLength: 50
          description: State or province for the primary address.
          example: example_value
        address1_postalcode:
          type: string
          maxLength: 20
          description: ZIP code or postal code for the primary address.
          example: example_value
        address1_country:
          type: string
          maxLength: 80
          description: Country or region for the primary address.
          example: example_value
        address1_county:
          type: string
          maxLength: 50
          description: County for the primary address.
          example: example_value
        address1_telephone1:
          type: string
          maxLength: 50
          description: Main phone number for the primary address.
          example: example_value
        address1_fax:
          type: string
          maxLength: 50
