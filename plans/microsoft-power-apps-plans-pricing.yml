specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Microsoft Power Apps
providerId: microsoft-power-apps
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Business Applications
  - Cloud
  - Enterprise
  - Low-Code
  - Microsoft
  - Power Platform
description: Microsoft Power Apps is sold per-user with an unlimited app entitlement at the Premium tier
  plus a Developer (free) tier for evaluation. Storage is billed via Dataverse capacity add-ons. API
  consumption is governed by per-user 24-hour Power Platform request entitlements rather than per-call
  pricing. Volume discounting is available at 2,000+ seat minimums. Custom enterprise terms available
  via Microsoft direct sales.
sources:
  - https://www.microsoft.com/en-us/power-platform/products/power-apps/pricing
  - https://learn.microsoft.com/en-us/power-platform/admin/api-request-limits-allocations
plans:
  - id: microsoft-power-apps-developer
    name: Power Apps Developer Plan
    type: freemium
    description: Free developer plan for evaluation, prototyping and learning. Three developer environments
      with Dataverse and connector access.
    entries:
      - label: Per-user license
        name: developer_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: true
      - label: Power Platform requests
        name: ppr_developer
        type: quota
        metric: requests
        limit: 6000
        timeFrame: day
        geo: global
        unit: 1
        price: included
        userMultiplied: true
      - label: Dataverse database entitlement
        name: dataverse_db
        type: quota
        metric: GB
        limit: 2
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Three developer environments
      - name: Prebuilt, custom and on-premises connectors
      - name: 750 automation flows per month
      - name: Dataverse access
  - id: microsoft-power-apps-premium
    name: Power Apps Premium
    type: subscription
    description: Production per-user plan; unlimited Power Apps and Power Pages for assigned user.
      $20/user/month (annual billing).
    entries:
      - label: Per-user license
        name: premium_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '20.00'
        userMultiplied: true
      - label: Power Platform requests
        name: ppr_premium
        type: quota
        metric: requests
        limit: 40000
        timeFrame: day
        geo: global
        unit: 1
        price: included
        userMultiplied: true
      - label: Dataverse database entitlement
        name: dataverse_db
        type: quota
        metric: MB
        limit: 250
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: true
      - label: Dataverse file capacity entitlement
        name: dataverse_file
        type: quota
        metric: GB
        limit: 2
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: true
    elements:
      - name: Unlimited Power Apps and Power Pages for assigned user
      - name: Prebuilt, custom and on-premises connectors
      - name: Agentic features
      - name: Microsoft 365 Copilot chat access
  - id: microsoft-power-apps-premium-volume
    name: Power Apps Premium (2,000+ Seat Minimum)
    type: subscription
    description: Volume-discounted Premium plan for organizations purchasing 2,000+ seats. Same entitlements
      as Premium at $12/user/month (annual billing).
    entries:
      - label: Per-user license (volume)
        name: premium_volume_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '12.00'
        userMultiplied: true
      - label: Power Platform requests
        name: ppr_premium_volume
        type: quota
        metric: requests
        limit: 40000
        timeFrame: day
        geo: global
        unit: 1
        price: included
        userMultiplied: true
    elements:
      - name: 2,000+ seat minimum
      - name: All Premium plan capabilities
      - name: Volume pricing
  - id: microsoft-power-apps-dataverse-addon
    name: Dataverse Database Capacity Add-on
    type: usage-based
    description: Per-GB Dataverse capacity add-on for additional cloud database storage. $40/GB/month
      (annual billing).
    entries:
      - label: Dataverse database GB-month
        name: dataverse_capacity
        type: metered
        metric: GB
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '40.00'
        userMultiplied: false
    elements:
      - name: Additional Dataverse database storage
      - name: Stackable on top of seat entitlements
  - id: microsoft-power-apps-payg
    name: Power Apps Pay-as-you-go
    type: pay-as-you-go
    description: Azure-billed pay-as-you-go meter for Power Apps usage without per-user license. Subject
      to the 6,000 Power Platform requests/24hr per active user limit.
    entries:
      - label: Active user / app run
        name: payg_active_user
        type: metered
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see Azure meter
        userMultiplied: false
      - label: Power Platform requests
        name: ppr_payg
        type: quota
        metric: requests
        limit: 6000
        timeFrame: day
        geo: global
        unit: 1
        price: included
        userMultiplied: true
    elements:
      - name: No upfront commitment
      - name: Billed via Azure subscription
      - name: Useful for unpredictable / occasional usage
  - id: microsoft-power-apps-ppr-addon
    name: Power Platform Request Capacity Add-on
    type: usage-based
    description: Capacity add-on raising the per-user (or per-flow) Power Platform request limit by 50,000
      requests per 24 hours. Stackable.
    entries:
      - label: PPR capacity pack
        name: ppr_addon_pack
        type: metered
        metric: requests
        limit: 50000
        timeFrame: day
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Stackable
      - name: Used to avoid high-usage enforcement
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
