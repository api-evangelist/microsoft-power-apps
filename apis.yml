aid: microsoft-power-apps
name: Microsoft Power Apps
description: >-
  Collection of APIs for Microsoft Power Apps platform enabling low-code application
  development, automation, and data connectivity.
image: https://powerplatform.microsoft.com/images/power-apps-logo.png
created: '2024'
modified: '2026-03-16'
artifacts:
  openapi:
    - name: Microsoft Dataverse Web API OpenAPI Specification
      path: openapi/microsoft-power-apps-dataverse-web-api-openapi.yml
      version: 3.1.0
      description: OpenAPI 3.1.0 specification for the Dataverse Web API v9.2 
        covering accounts, contacts, and entity definitions with full CRUD 
        operations and OData query support
  jsonSchema:
    - name: Microsoft Power Apps Dataverse Entity Schema
      path: json-schema/microsoft-power-apps-entity-schema.json
      version: draft/2020-12
      description: JSON Schema defining core Dataverse entity types (Account, 
        Contact, Entity) with property types, constraints, and enum values based
        on the Microsoft.Dynamics.CRM namespace
  jsonLd:
    - name: Microsoft Power Apps JSON-LD Context
      path: json-ld/microsoft-power-apps-context.jsonld
      version: '1.1'
      description: JSON-LD context mapping Dataverse entity properties to 
        Schema.org, Dublin Core, OData, and vCard vocabularies for semantic 
        interoperability
specificationVersion: '0.19'
url: 
  https://raw.githubusercontent.com/api-evangelist/microsoft-power-apps/refs/heads/main/apis.yml
